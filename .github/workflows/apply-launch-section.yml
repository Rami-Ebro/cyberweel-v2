name: Apply launch section update

on:
  push:
    branches:
      - codex/launch-homepage-conversion

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[section-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/launch-homepage-conversion
          fetch-depth: 0

      - name: Update second homepage section
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('src/components/sections/home-view.tsx')
          text = path.read_text(encoding='utf-8')

          replacement = '''  const practicalHelp = t.dir === "rtl"
    ? {
        eyebrow: "ابدأ من وضعك الحقيقي",
        title: "أيٌّ من هذه الحالات يشبهك؟",
        intro: "لا تحتاج إلى معرفة الحل قبل أن تتواصل معنا. يكفي أن تعرف ما الذي يعيق تقدمك.",
        cards: [
          {
            title: "لدي مشروع ولا أعرف الخطوة التالية",
            text: "نرتب الصورة ونحدد القرار الأكثر أولوية بدل تشتيتك بعشرات الخيارات.",
          },
          {
            title: "لدي مشكلة رقمية ولا أعرف سببها",
            text: "نفصل الأعراض عن السبب الحقيقي قبل البدء بأي تنفيذ.",
          },
          {
            title: "أحتاج موقعًا أو نظامًا لكن أخشى الاختيار الخطأ",
            text: "نحدد ما تحتاجه فعلًا، وما يمكنك تأجيله، وما لا يستحق أن تدفع مقابله الآن.",
          },
        ],
      }
    : {
        eyebrow: "Start from where you are",
        title: "Which situation sounds like yours?",
        intro: "You do not need to know the solution before contacting us. You only need to know what is blocking your progress.",
        cards: [
          {
            title: "I have a project but not a clear next step",
            text: "We organize the picture and identify the highest-priority decision instead of overwhelming you with options.",
          },
          {
            title: "I have a digital problem but do not know the cause",
            text: "We separate symptoms from the real cause before any execution begins.",
          },
          {
            title: "I need a website or system but fear choosing wrong",
            text: "We define what you truly need, what can wait, and what is not worth paying for now.",
          },
        ],
      };
'''

          text, count = re.subn(
              r'  const practicalHelp = t\.dir === "rtl".*?      };\n(?=  const howWeHelpTeaserEyebrow)',
              replacement,
              text,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit(f'Expected one practicalHelp block, found {count}')

          text = text.replace(
              'practicalHelp: "كيف نساعدك؟",',
              'practicalHelp: "أيٌّ من هذه الحالات يشبهك؟",',
          )
          text = text.replace(
              'practicalHelp: "How we help you",',
              'practicalHelp: "Which situation sounds like yours?",',
          )
          text = text.replace(
              'className="relative mt-16 grid gap-8 md:grid-cols-2 lg:grid-cols-4"',
              'className="relative mt-16 grid gap-8 md:grid-cols-3"',
              1,
          )
          text = text.replace(
              'className="group relative flex gap-5 rounded-xl border border-border bg-muted p-8 text-center transition-all duration-300 hover:-translate-y-1 hover:border-camel/40 hover:shadow-lg hover:shadow-ink/[0.06] md:block"',
              'className="group relative flex gap-5 rounded-xl border border-border bg-muted p-8 text-center transition-all duration-300 hover:-translate-y-1.5 hover:border-camel/60 hover:bg-background hover:shadow-xl hover:shadow-ink/[0.08] md:block"',
              1,
          )
          text = text.replace(
              'className="inline-flex rounded-md bg-white px-3 py-1 font-display text-base font-medium tracking-[0.2em] text-ink shadow-sm"',
              'className="inline-flex rounded-md bg-ink px-3 py-1 font-display text-base font-medium tracking-[0.2em] text-floral shadow-sm transition-colors duration-300 group-hover:bg-camel group-hover:text-ink"',
              1,
          )

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit update
        run: |
          rm .github/workflows/apply-launch-section.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/sections/home-view.tsx .github/workflows/apply-launch-section.yml
          git commit -m "feat: add visitor situations section with card hover [section-applied]"
          git push origin codex/launch-homepage-conversion
